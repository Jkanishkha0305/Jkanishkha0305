name: Generate Snake

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/workflows/main.yml

permissions:
  contents: write

concurrency:
  group: generate-snake
  cancel-in-progress: true

jobs:
  snake:
    name: Build contribution snake
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=%230284c7&color_dots=%23dbeafe,%2393c5fd,%2360a5fa,%232563eb,%231d4ed8
            dist/github-snake-dark.svg?color_snake=%2360a5fa&color_dots=%230f172a,%231e3a8a,%232563eb,%2360a5fa,%2393c5fd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish snake assets to output branch
        shell: bash
        run: |
          set -euo pipefail

          worktree_dir="$(mktemp -d)"
          trap 'git worktree remove "$worktree_dir" --force' EXIT

          if git ls-remote --exit-code --heads origin output >/dev/null 2>&1; then
            git fetch --no-tags origin output
            git worktree add -B output "$worktree_dir" FETCH_HEAD
          else
            git worktree add -b output "$worktree_dir"
          fi

          cp dist/github-snake.svg "$worktree_dir/github-snake.svg"
          cp dist/github-snake-dark.svg "$worktree_dir/github-snake-dark.svg"
          touch "$worktree_dir/.nojekyll"

          cd "$worktree_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-snake.svg github-snake-dark.svg .nojekyll

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "docs: update snake animation"
          git push origin output
